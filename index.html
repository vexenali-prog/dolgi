<!DOCTYPE html>
<html lang="ru">
<head>

<script>(function(){try{var m=localStorage.getItem('radmir-debts-theme');if(m&&m!=='system')document.documentElement.setAttribute('data-theme',m);}catch(e){}})();</script>
<style>
  :root {
    --bg: #000; --card: #1C1C1E; --inner: #2C2C2E; --segment: #48484A;
    --sep: #38383A; --text: #FFF; --sec: rgba(235,235,245,0.6); --ter: rgba(235,235,245,0.3);
    --blue: #0A84FF; --green: #30D158; --red: #FF453A; --orange: #FF9F0A;
  }
  :root[data-theme="light"] {
    --bg: #F2F2F7; --card: #FFFFFF; --inner: #E3E3E8; --segment: #FFFFFF;
    --sep: #C6C6C8; --text: #000000; --sec: rgba(60,60,67,0.6); --ter: rgba(60,60,67,0.3);
    --blue: #007AFF; --green: #34C759; --red: #FF3B30; --orange: #FF9500;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg: #F2F2F7; --card: #FFFFFF; --inner: #E3E3E8; --segment: #FFFFFF;
      --sep: #C6C6C8; --text: #000000; --sec: rgba(60,60,67,0.6); --ter: rgba(60,60,67,0.3);
      --blue: #007AFF; --green: #34C759; --red: #FF3B30; --orange: #FF9500;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    padding: env(safe-area-inset-top) 0 60px;
  }
  .wrap { max-width: 430px; margin: 0 auto; padding-top: 18px; }
  .topbar { display: flex; align-items: center; gap: 4px; padding: 0 8px; }
  .icon-btn { background: none; border: none; color: var(--text); font-size: 22px; padding: 4px 8px; cursor: pointer; }
  h1 { font-size: 34px; font-weight: 700; margin: 0; }
  .card { background: var(--card); border-radius: 12px; margin: 0 16px; }
  .balance { padding: 16px; margin-top: 14px; }
  .balance .lbl { font-size: 13px; color: var(--sec); margin-bottom: 4px; }
  .balance .sum { font-size: 36px; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .balance .sub { font-size: 14px; margin-top: 6px; color: var(--sec); }
  .drip { color: var(--green); font-weight: 600; }
  .section { font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--sec); padding: 0 16px 7px; margin-top: 22px; }
  .search-wrap { padding: 0 16px; margin-top: 18px; }
  .btn-filled {
    display: block; width: calc(100% - 32px); margin: 12px 16px 0; background: var(--blue); color: #fff;
    border: none; border-radius: 12px; padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: transform .12s ease;
  }
  .btn-text { background: none; border: none; font-size: 15px; padding: 6px 2px; cursor: pointer; color: var(--blue); transition: transform .12s ease; }
  .btn-text.bold { font-weight: 600; }
  .btn-text.green { color: var(--green); }
  .btn-text.red { color: var(--red); }
  .btn-text.orange { color: var(--orange); }
  .btn-text.sec { color: var(--sec); }
  .btn-text:active, .btn-filled:active { transform: scale(0.96); }
  .pbtn { background: none; border: none; color: var(--ter); font-size: 13px; padding: 0 3px; cursor: pointer; }
  input {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 11px 12px; font-size: 17px; width: 100%; outline: none; -webkit-appearance: none;
    color-scheme: dark;
  }
  :root[data-theme="light"] input { color-scheme: light; }
  @media (prefers-color-scheme: light) { :root:not([data-theme]) input { color-scheme: light; } }
  .row { display: flex; gap: 10px; }
  .grid { display: grid; gap: 10px; }
  .form {
    padding: 14px; margin-top: 12px; overflow: hidden; max-height: 800px; opacity: 1;
    transition: max-height .28s ease, opacity .28s ease, margin-top .28s ease;
  }
  .form.collapsed { max-height: 0; opacity: 0; margin-top: 0; padding-top: 0; padding-bottom: 0; }
  .seg { display: flex; background: var(--inner); border-radius: 9px; padding: 2px; }
  .seg button {
    flex: 1; padding: 8px 0; border-radius: 7px; border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: var(--sec);
  }
  .seg button.on { background: var(--segment); color: var(--text); }
  .err { color: var(--red); font-size: 14px; }
  .loan { padding: 13px 16px; }
  .loan + .loan { border-top: 0.5px solid var(--sep); }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .loan .name { font-size: 17px; font-weight: 600; }
  .loan .owed { font-size: 20px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .loan .status { font-size: 14px; margin-top: 3px; }
  .loan .meta { font-size: 13px; color: var(--ter); margin-top: 2px; }
  .pay-line { font-size: 13px; display: flex; justify-content: space-between; padding: 2px 0; color: var(--sec); }
  .pay-line .val { color: var(--green); font-variant-numeric: tabular-nums; }
  .pay-line .item { color: var(--orange); }
  .pay-line-edit { padding: 4px 0; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 6px; }
  .empty { padding: 18px; color: var(--sec); font-size: 15px; }
  .closed-item { padding: 12px 16px; border-top: 0.5px solid var(--sep); }
  .closed-item .meta { font-size: 13px; color: var(--ter); margin-top: 2px; }
  .footer { font-size: 12px; color: var(--ter); margin: 24px 16px 0; line-height: 1.5; }
  textarea {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 10px; font-size: 13px; width: 100%; min-height: 90px; outline: none; font-family: ui-monospace, monospace;
  }
  .hidden { display: none; }

  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity .28s ease; z-index: 40;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; height: 100%; width: min(86vw, 400px);
    background: var(--bg); transform: translateX(-100%);
    transition: transform .28s ease; z-index: 50; overflow-y: auto;
    box-shadow: 2px 0 24px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-inner { padding: calc(env(safe-area-inset-top) + 16px) 0 40px; }
  .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px; }

  .stat-row { display: flex; justify-content: space-between; padding: 10px 16px; }
  .stat-row + .stat-row { border-top: 0.5px solid var(--sep); }
  .stat-lbl { font-size: 14px; color: var(--sec); }
  .stat-val { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .trash-sub { padding: 10px 16px 4px; font-size: 13px; color: var(--sec); }
  .bar-row { padding: 8px 16px; }
  .bar-row .bar-head { display: flex; justify-content: space-between; font-size: 13px; color: var(--sec); margin-bottom: 4px; }
  .bar-track { background: var(--inner); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { background: var(--blue); height: 100%; border-radius: 4px; }

  #reminderBanner { transition: opacity .28s ease; }
  #reminderBanner.fading { opacity: 0; }

  #lockScreen {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 24px;
  }
  #lockScreen.hidden { display: none; }
  #lockScreen input { max-width: 160px; text-align: center; font-size: 28px; letter-spacing: 10px; }
</style>
</head>
<body>

  </div>

  <div class="card balance">

<script>
// ---------- math (verified 8/8 against the owner's examples) ----------
function daysBetween(a, b) { return Math.round((Date.parse(b) - Date.parse(a)) / 86400000); }
function paidSum(l) { return (l.payments || []).filter(function(p) { return !p.deleted; }).reduce(function(s, p) { return s + p.value; }, 0); }

// day-index helpers for pause interval math (kept separate from daysBetween, which stays untouched)
function dayIndex(ymd) { return Math.round(Date.parse(ymd) / 86400000); }
function pausedDaysInRange(l, rangeStartYmd, rangeEndYmd) {
  var from = dayIndex(rangeStartYmd), to = dayIndex(rangeEndYmd);
  if (to <= from) return 0;
  var sum = 0;
  (l.pauses || []).forEach(function(p) {
    var ps = dayIndex(p.start);
    var pe = p.end ? dayIndex(p.end) : to;
    var s = Math.max(ps, from), e = Math.min(pe, to);
    if (e > s) sum += (e - s);
  });
  return sum;
}
function accruingDays(l, rangeStartYmd, t) {
  return Math.max(0, daysBetween(rangeStartYmd, t) - pausedDaysInRange(l, rangeStartYmd, t));
}
function isPausedOn(l, ymd) {
  var d = dayIndex(ymd);
  return (l.pauses || []).some(function(p) {
    var ps = dayIndex(p.start), pe = p.end ? dayIndex(p.end) : Infinity;
    return d >= ps && d < pe;
  });
}
function activePause(l) {
  var pauses = l.pauses || [];
  for (var i = pauses.length - 1; i >= 0; i--) if (pauses[i].end === null) return pauses[i];
  return null;
}

function owedNow(l, t) {
  if (l.type === 'deadline') {
    var over = accruingDays(l, l.dueDate, t);
    return l.returnAmount + over * l.dailyRate - paidSum(l);
  }
  var days = accruingDays(l, l.issueDate, t);
  return l.principal + days * l.dailyRate - paidSum(l);
}
function dripPerDay(l, t) {
  if (isPausedOn(l, t)) return 0;
  if (l.type === 'deadline') return daysBetween(l.dueDate, t) > 0 ? l.dailyRate : 0;
  return l.dailyRate;
}
function localToday() {
  var d = new Date(), p = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function groupDigits(digits) { return digits.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
function formatMoneyValue(n) {
  if (n === '' || n === null || n === undefined || isNaN(n)) return '';
  return groupDigits(String(Math.round(Number(n))));
}
function parseMoneyInput(id) {
  var raw = document.getElementById(id).value || '';
  return parseFloat(raw.replace(/\./g, ''));
}
function fmtDate(ymd) { if (!ymd) return ''; var p = ymd.split('-'); return p[2] + '.' + p[1]; }
function fmtDateInput(ymd) { if (!ymd) return ''; var p = ymd.split('-'); return p[2] + '.' + p[1] + '.' + p[0]; }
function formatDateDigits(digits) {
  digits = digits.slice(0, 8);
  if (digits.length <= 2) return digits;
  if (digits.length <= 4) return digits.slice(0, 2) + '.' + digits.slice(2);
  return digits.slice(0, 2) + '.' + digits.slice(2, 4) + '.' + digits.slice(4);
}
function parseRuDate(text) {
  var m = (text || '').trim().match(/^(\d{1,2})\.(\d{1,2})(?:\.(\d{2,4}))?$/);
  if (!m) return null;
  var day = parseInt(m[1], 10), month = parseInt(m[2], 10);
  var year = m[3] ? (m[3].length === 2 ? 2000 + parseInt(m[3], 10) : parseInt(m[3], 10)) : new Date().getFullYear();
  if (month < 1 || month > 12 || day < 1 || day > 31) return null;
  var p2 = function(n) { return String(n).padStart(2, '0'); };
  return year + '-' + p2(month) + '-' + p2(day);
}
function fmtMonth(ym) {
  var names = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
  var p = ym.split('-');
  return names[parseInt(p[1], 10) - 1] + ' ' + p[0];
}
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ---------- state ----------
var KEY = 'radmir-debts';
var REMINDER_KEY = 'radmir-debts-reminder-dismissed';
var THEME_KEY = 'radmir-debts-theme';
var PIN_HASH_KEY = 'radmir-debts-pin-hash';
var PIN_SALT_KEY = 'radmir-debts-pin-salt';
var loans = [];
var fType = 'deadline';
var editingId = null;
var payingId = null;
var editingPaymentKey = null;
var purgeArmId = null;
var purgeArmPayKey = null;
var pinRemoveArmed = false;
var armTimer = null;
var showClosed = false;
var showHistory = false;
var searchQuery = '';
var drawerOpen = false;
var themeMode = localStorage.getItem(THEME_KEY) || 'system';
var unlocked = true;
var pinFormMode = null;

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed.loans)) loans = parsed.loans;
    }
  } catch (e) { loans = []; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ loans: loans })); }
  catch (e) { alert('Не удалось сохранить: ' + e.message); }
}

// ---------- search ----------
function matchesSearch(l) {
  var q = searchQuery.trim().toLowerCase();
  return !q || l.name.toLowerCase().indexOf(q) !== -1;
}

// ---------- theme ----------
function applyTheme(mode) {
  if (mode === 'system') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', mode);
  var light = mode === 'light' || (mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
  var meta = document.getElementById('themeColorMeta');
  if (meta) meta.setAttribute('content', light ? '#F2F2F7' : '#000000');
}
function setTheme(mode) {
  themeMode = mode;
  localStorage.setItem(THEME_KEY, mode);
  applyTheme(mode);
  renderSettings();
}

// ---------- PIN lock ----------
function isPinSet() { return !!localStorage.getItem(PIN_HASH_KEY); }
function randomSalt() {
  if (window.crypto && window.crypto.getRandomValues) {
    var arr = new Uint8Array(16);
    window.crypto.getRandomValues(arr);
    return Array.prototype.map.call(arr, function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  return String(Math.random()).slice(2) + String(Date.now());
}
function fnv1aHash(str) {
  var h = 0x811c9dc5;
  for (var i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(16);
}
function hashPin(pin, salt, cb) {
  var data = salt + pin;
  if (window.crypto && window.crypto.subtle) {
    var enc = new TextEncoder().encode(data);
    window.crypto.subtle.digest('SHA-256', enc).then(function(buf) {
      var hex = Array.prototype.map.call(new Uint8Array(buf), function(b) { return b.toString(16).padStart(2, '0'); }).join('');
      cb(hex);
    }, function() { cb(fnv1aHash(data)); });
  } else {
    cb(fnv1aHash(data));
  }
}
function setPin(pin, cb) {
  var salt = randomSalt();
  hashPin(pin, salt, function(hash) {
    localStorage.setItem(PIN_SALT_KEY, salt);
    localStorage.setItem(PIN_HASH_KEY, hash);
    cb();
  });
}
function removePin() {
  localStorage.removeItem(PIN_SALT_KEY);
  localStorage.removeItem(PIN_HASH_KEY);
}
function attemptUnlock(pin, cb) {
  var salt = localStorage.getItem(PIN_SALT_KEY) || '';
  hashPin(pin, salt, function(hash) {
    cb(hash === localStorage.getItem(PIN_HASH_KEY));
  });
}
function showLockScreen() {
  unlocked = false;
  var el = document.getElementById('lockScreen');
  el.classList.remove('hidden');
  document.getElementById('lockPinInput').value = '';
  document.getElementById('lockError').classList.add('hidden');
  document.getElementById('lockPinInput').focus();
}
function hideLockScreen() {
  unlocked = true;
  document.getElementById('lockScreen').classList.add('hidden');
}
var PIN_GRACE_MS = 30000;
var lastHiddenAt = null;
function checkRelock() {
  if (!isPinSet()) return;
  if (document.visibilityState === 'hidden') {
    lastHiddenAt = Date.now();
  } else if (document.visibilityState === 'visible' && lastHiddenAt !== null) {
    var elapsed = Date.now() - lastHiddenAt;
    lastHiddenAt = null;
    if (elapsed > PIN_GRACE_MS) showLockScreen();
  }
}

// ---------- people ----------
function computePeople(t) {
  var live = loans.filter(function(l) { return !l.deleted; });
  var groups = {};
  live.forEach(function(l) {
    if (!groups[l.name]) groups[l.name] = { name: l.name, totalLent: 0, owedNow: 0, loanCount: 0 };
    var g = groups[l.name];
    g.totalLent += l.principal;
    g.loanCount += 1;
    if (!l.closed) g.owedNow += Math.max(0, owedNow(l, t));
  });
  return Object.keys(groups).map(function(k) { return groups[k]; }).sort(function(a, b) {
    return b.owedNow - a.owedNow || b.totalLent - a.totalLent;
  });
}

// ---------- reminders ----------
function dueReminders(t) {
  return loans.filter(function(l) {
    return !l.deleted && !l.closed && l.type === 'deadline' && !isPausedOn(l, t) && daysBetween(l.dueDate, t) >= 0;
  });
}
function remindersDismissedToday(t) { return localStorage.getItem(REMINDER_KEY) === t; }
function dismissRemindersForToday(t) { localStorage.setItem(REMINDER_KEY, t); }
function renderReminders(t) {
  var due = dueReminders(t);
  var el = document.getElementById('reminderBanner');
  if (!due.length || remindersDismissedToday(t)) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  el.innerHTML = '<div style="font-weight:600;margin-bottom:6px">Напоминания</div>' +
    due.map(function(l) {
      return '<div style="font-size:14px;margin-top:2px">' + esc(l.name) + ' — ' + statusInfo(l, t).text.split(' · ')[0] + '</div>';
    }).join('') +
    '<button class="btn-text sec" data-act="dismissreminders" style="margin-top:8px;padding-left:0">Скрыть на сегодня</button>';
}

// ---------- statistics ----------
function computeStats(t) {
  var live = loans.filter(function(l) { return !l.deleted; });
  var lifetimeLent = live.reduce(function(s, l) { return s + l.principal; }, 0);
  var lifetimeRepaid = live.reduce(function(s, l) { return s + paidSum(l); }, 0);
  var debtors = live.filter(function(l) { return !l.closed; })
    .map(function(l) { return { name: l.name, owed: Math.max(0, owedNow(l, t)) }; })
    .sort(function(a, b) { return b.owed - a.owed; })
    .slice(0, 5);
  var byMonth = {};
  live.forEach(function(l) {
    var m = (l.issueDate || '').slice(0, 7);
    if (!m) return;
    byMonth[m] = (byMonth[m] || 0) + l.principal;
  });
  var months = Object.keys(byMonth).sort();
  var maxMonth = months.reduce(function(mx, m) { return Math.max(mx, byMonth[m]); }, 0);
  return { lifetimeLent: lifetimeLent, lifetimeRepaid: lifetimeRepaid, debtors: debtors, months: months, byMonth: byMonth, maxMonth: maxMonth };
}
function renderStats() {
  var s = computeStats(localToday());
  var html = '<div class="stat-row"><span class="stat-lbl">Выдано всего</span><span class="stat-val">' + fmt(s.lifetimeLent) + ' ₽</span></div>' +
    '<div class="stat-row"><span class="stat-lbl">Возвращено всего</span><span class="stat-val">' + fmt(s.lifetimeRepaid) + ' ₽</span></div>';
  if (s.debtors.length) {
    html += '<div class="trash-sub">Больше всех должны</div>' +
      s.debtors.map(function(d) {
        return '<div class="stat-row"><span class="stat-lbl">' + esc(d.name) + '</span><span class="stat-val">' + fmt(d.owed) + ' ₽</span></div>';
      }).join('');
  }
  if (s.months.length) {
    html += '<div class="trash-sub">Выдано по месяцам</div>' +
      s.months.map(function(m) {
        var pct = s.maxMonth > 0 ? Math.round(s.byMonth[m] / s.maxMonth * 100) : 0;
        return '<div class="bar-row"><div class="bar-head"><span>' + fmtMonth(m) + '</span><span>' + fmt(s.byMonth[m]) + ' ₽</span></div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div>';
      }).join('');
  }
  document.getElementById('statsContent').innerHTML = html;
}

// ---------- trash ----------
function collectTrashedPayments() {
  var out = [];
  loans.forEach(function(l) {
    if (l.deleted) return;
    (l.payments || []).forEach(function(p) {
      if (p.deleted) out.push({ loanId: l.id, loanName: l.name, payment: p });
    });
  });
  return out;
}
function renderTrash() {

// ---------- history log ----------
function buildHistory(allLoans) {
  var events = [];
  allLoans.forEach(function(l) {
    var name = esc(l.name);
    events.push({ date: l.issueDate, order: 0, html: 'Записан долг «' + name + '» · ' + fmt(l.principal) + ' ₽' });
    (l.payments || []).filter(function(p) { return !p.deleted; }).forEach(function(p) {
      events.push({ date: p.date, order: 1, html: name + ' — выплата ' + fmt(p.value) + ' ₽' + (p.note ? ' (' + esc(p.note) + ')' : '') });
    });
    (l.pauses || []).forEach(function(p) {
      events.push({ date: p.start, order: 2, html: name + ' — поставлен на паузу' });
      if (p.end) events.push({ date: p.end, order: 3, html: name + ' — снят с паузы' });
    });
    if (l.closed) events.push({ date: l.closedDate, order: 4, html: name + ' — долг погашен' });
  });
  events.sort(function(a, b) {
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return b.order - a.order;
  });
  return events;
}

// ---------- render ----------
function statusInfo(l, t) {
  var pausedNow = isPausedOn(l, t);
  var rateSuffix = pausedNow ? ' · на паузе' : ' · +' + fmt(l.dailyRate) + ' ₽/день';
  if (l.type === 'deadline') {
    var over = daysBetween(l.dueDate, t);
    if (over > 0) return { text: 'Просрочка ' + over + ' дн' + rateSuffix, color: pausedNow ? 'var(--sec)' : 'var(--red)', overdue: !pausedNow };
    if (over === 0) return { text: 'Вернуть сегодня', color: 'var(--orange)', overdue: false };
    return { text: 'Вернуть до ' + fmtDate(l.dueDate), color: 'var(--sec)', overdue: false };
  }
  var days = Math.max(0, daysBetween(l.issueDate, t));
  return { text: 'Капает ' + days + ' дн' + rateSuffix, color: pausedNow ? 'var(--sec)' : 'var(--orange)', overdue: false };
}

  var t = localToday();
  var live = loans.filter(function(l) { return !l.deleted; });
  var allActive = live.filter(function(l) { return !l.closed; });
  var allClosed = live.filter(function(l) { return l.closed; });
  var act = allActive.filter(matchesSearch);
  act.sort(function(a, b) {
    var ao = a.type === 'deadline' && daysBetween(a.dueDate, t) > 0 ? 1 : 0;
    var bo = b.type === 'deadline' && daysBetween(b.dueDate, t) > 0 ? 1 : 0;
    if (ao !== bo) return bo - ao;
    return owedNow(b, t) - owedNow(a, t);
  });
  var cls = allClosed.filter(matchesSearch);

  renderReminders(t);

  var total = allActive.reduce(function(s, l) { return s + Math.max(0, owedNow(l, t)); }, 0);
  var drip = allActive.reduce(function(s, l) { return s + dripPerDay(l, t); }, 0);
  document.getElementById('totalOwed').textContent = fmt(total) + ' ₽';
  document.getElementById('totalSub').innerHTML =
    (drip > 0 ? '<span class="drip">+' + fmt(drip) + ' ₽/день</span> · ' : '') +
    allActive.length + ' активных' + (allClosed.length ? ' · ' + allClosed.length + ' закрыто' : '');

            '<input value="' + esc(p.note || '') + '" placeholder="Чем? (пусто = деньги)" id="payEditNote">' +
            '</div>' +

            '<button class="btn-text bold" data-act="paymentsave" data-id="' + l.id + '" data-pid="' + p.id + '">Сохранить</button>' +
            '<button class="btn-text sec" data-act="paymenteditcancel">Отмена</button>' +
            '</div></div>';
        }
        return '<div class="pay-line"><span>' + fmtDate(p.date) + ' · ' +

          '<button class="pbtn" data-act="paymentdel" data-id="' + l.id + '" data-pid="' + p.id + '">✕</button>' +
          '</span></div>';
      }).join('');
      var actions;
      if (payingId === l.id) {
        actions =
          '<div class="grid" style="margin-top:10px">' +
          '<div class="row">' +
          '<input type="text" inputmode="numeric" class="money-input" placeholder="Сумма" style="width:120px;flex-shrink:0" id="payValue" autofocus>' +
          '<input placeholder="Чем? (пусто = деньги)" id="payNote">' +
          '</div>' +
          '<div style="display:flex;gap:14px">' +
          '<button class="btn-text bold" data-act="paydo" data-id="' + l.id + '">Списать</button>' +
          '<button class="btn-text sec" data-act="paycancel">Отмена</button>' +
          '</div></div>';
      } else {

        actions =

          '<button class="btn-text green bold" data-act="close" data-id="' + l.id + '">Погасил</button>' +
          '<button class="btn-text" data-act="editloan" data-id="' + l.id + '">Изменить</button>' +
          (isPausedState
            ? '<button class="btn-text" data-act="resumeloan" data-id="' + l.id + '">Возобновить</button>'
            : '<button class="btn-text orange" data-act="pauseloan" data-id="' + l.id + '">Пауза</button>') +
          '<button class="btn-text red" data-act="del" data-id="' + l.id + '">Удалить</button>' +
          '</div>';
      }
      return '<div class="loan">' +
        '<div class="top"><span class="name">' + esc(l.name) + '</span>' +

        '<div class="status" style="color:' + st.color + ';font-weight:' + (st.overdue ? 600 : 400) + '">' + st.text + '</div>' +

    var rows = !showClosed ? '' : cls.map(function(l) {

        '<div class="meta">Выдал ' + fmt(l.principal) + ' ₽ · вернул ' + fmt(paidSum(l)) + ' ₽' +

    }).join('');
    cList.innerHTML = head + rows;
  }

  var hBlock = document.getElementById('historyBlock');
  var hList = document.getElementById('historyList');
  if (live.length === 0) {
    hBlock.classList.add('hidden');
  } else {
    hBlock.classList.remove('hidden');
    var hHead = '<div style="padding:4px 16px"><button class="btn-text" data-act="togglehistory">' +

      return '<div class="closed-item"><div class="top"><span style="font-size:14px">' + ev.html + '</span>' +

// ---------- drawer ----------
function openDrawer() {
  drawerOpen = true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  renderStats();
  renderTrash();
  renderPeople();
  renderSettings();
}
function closeDrawer() {
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
document.getElementById('menuBtn').addEventListener('click', openDrawer);
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
document.getElementById('drawerCloseBtn').addEventListener('click', closeDrawer);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && drawerOpen) closeDrawer(); });

// ---------- actions ----------
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-act]');
  if (!btn) return;
  var act = btn.getAttribute('data-act');
  var id = btn.getAttribute('data-id');
  var pid = btn.getAttribute('data-pid');
  var payKey = pid ? id + ':' + pid : null;

  clearTimeout(armTimer);
  if (act !== 'purgeloan') purgeArmId = null;
  if (act !== 'purgepayment') purgeArmPayKey = null;
  if (act !== 'pinremove') pinRemoveArmed = false;

  if (act === 'pay') { payingId = id; editingPaymentKey = null; render(); return; }
  if (act === 'paycancel') { payingId = null; render(); return; }
  if (act === 'paydo') {
    var v = parseMoneyInput('payValue');
    var note = (document.getElementById('payNote').value || '').trim();
    if (isFinite(v) && v > 0) {
      loans = loans.map(function(l) {
        if (l.id !== id) return l;
        var pays = (l.payments || []).slice();
        pays.push({ id: String(Date.now()), date: localToday(), value: v, note: note });
        return Object.assign({}, l, { payments: pays });
      });
      payingId = null; save(); render();
    }
    return;
  }
  if (act === 'close') {
    loans = loans.map(function(l) { return l.id === id ? Object.assign({}, l, { closed: true, closedDate: localToday() }) : l; });
    save(); render();
    return;
  }

  if (act === 'del') {
    loans = loans.map(function(l) { return l.id === id ? Object.assign({}, l, { deleted: true, deletedDate: localToday() }) : l; });
    save(); render();
    return;
  }
  if (act === 'restoreloan') {
    loans = loans.map(function(l) { return l.id === id ? Object.assign({}, l, { deleted: false, deletedDate: null }) : l; });
    save(); render();
    return;
  }
  if (act === 'purgeloan') {
    if (purgeArmId !== id) {
      purgeArmId = id;
      armTimer = setTimeout(function() { purgeArmId = null; render(); }, 3000);
      render();
      return;
    }
    loans = loans.filter(function(l) { return l.id !== id; });
    purgeArmId = null; save(); render();
    return;
  }

  if (act === 'toggleclosed') { showClosed = !showClosed; render(); return; }
  if (act === 'togglehistory') { showHistory = !showHistory; render(); return; }
  if (act === 'dismissreminders') {
    var banner = document.getElementById('reminderBanner');
    banner.classList.add('fading');
    setTimeout(function() { dismissRemindersForToday(localToday()); render(); }, 280);
    return;
  }

  if (act === 'selectperson') {
    searchQuery = btn.getAttribute('data-name');
    document.getElementById('searchInput').value = searchQuery;
    closeDrawer();
    render();
    return;
  }

  if (act === 'theme') { setTheme(btn.getAttribute('data-mode')); return; }
  if (act === 'pinset') { pinFormMode = 'set'; renderSettings(); return; }
  if (act === 'pinchange') { pinFormMode = 'change'; renderSettings(); return; }
  if (act === 'pincancel') { pinFormMode = null; renderSettings(); return; }
  if (act === 'pinsave') {
    var p1 = document.getElementById('pinNew').value;
    var p2 = document.getElementById('pinConfirm').value;
    var errEl = document.getElementById('pinFormError');
    if (!/^\d{4}$/.test(p1)) { errEl.textContent = 'PIN — ровно 4 цифры'; errEl.classList.remove('hidden'); return; }
    if (p1 !== p2) { errEl.textContent = 'PIN не совпадают'; errEl.classList.remove('hidden'); return; }
    setPin(p1, function() { pinFormMode = null; renderSettings(); });
    return;
  }
  if (act === 'pinremove') {
    if (!pinRemoveArmed) {
      pinRemoveArmed = true;
      armTimer = setTimeout(function() { pinRemoveArmed = false; renderSettings(); }, 3000);
      renderSettings();
      return;
    }
    removePin();
    pinRemoveArmed = false;
    renderSettings();
    return;
  }

  if (act === 'editloan') {
    var loan = loans.find(function(l) { return l.id === id; });
    if (loan) openEditForm(loan);
    return;
  }
  if (act === 'pauseloan') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pauses = (l.pauses || []).slice();
      pauses.push({ id: String(Date.now()), start: localToday(), end: null });
      return Object.assign({}, l, { pauses: pauses });
    });
    save(); render();
    return;
  }
  if (act === 'resumeloan') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pauses = (l.pauses || []).map(function(p) { return p.end === null ? Object.assign({}, p, { end: localToday() }) : p; });
      return Object.assign({}, l, { pauses: pauses });
    });
    save(); render();
    return;
  }

  if (act === 'paymentedit') { editingPaymentKey = payKey; payingId = null; render(); return; }
  if (act === 'paymenteditcancel') { editingPaymentKey = null; render(); return; }
  if (act === 'paymentsave') {
    var pv = parseMoneyInput('payEditValue');
    var pn = (document.getElementById('payEditNote').value || '').trim();
    if (isFinite(pv) && pv > 0) {
      loans = loans.map(function(l) {
        if (l.id !== id) return l;
        var pays = (l.payments || []).map(function(p) { return p.id === pid ? Object.assign({}, p, { value: pv, note: pn }) : p; });
        return Object.assign({}, l, { payments: pays });
      });
      editingPaymentKey = null; save(); render();
    }
    return;
  }
  if (act === 'paymentdel') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pays = (l.payments || []).map(function(p) { return p.id === pid ? Object.assign({}, p, { deleted: true, deletedDate: localToday() }) : p; });
      return Object.assign({}, l, { payments: pays });
    });
    save(); render();
    return;
  }
  if (act === 'restorepayment') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pays = (l.payments || []).map(function(p) { return p.id === pid ? Object.assign({}, p, { deleted: false, deletedDate: null }) : p; });
      return Object.assign({}, l, { payments: pays });
    });
    save(); render();
    return;
  }
  if (act === 'purgepayment') {
    if (purgeArmPayKey !== payKey) {
      purgeArmPayKey = payKey;
      armTimer = setTimeout(function() { purgeArmPayKey = null; render(); }, 3000);
      render();
      return;
    }
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pays = (l.payments || []).filter(function(p) { return p.id !== pid; });
      return Object.assign({}, l, { payments: pays });
    });
    purgeArmPayKey = null; save(); render();
    return;
  }
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  render();
});

document.addEventListener('input', function(e) {
  if (e.target.classList && e.target.classList.contains('money-input')) {
    var digits = e.target.value.replace(/\D/g, '');
    e.target.value = groupDigits(digits);
    e.target.setSelectionRange(e.target.value.length, e.target.value.length);
  }
  if (e.target.classList && e.target.classList.contains('date-input')) {
    var ddigits = e.target.value.replace(/\D/g, '');
    e.target.value = formatDateDigits(ddigits);
    e.target.setSelectionRange(e.target.value.length, e.target.value.length);
  }
});

// form
var openFormBtn = document.getElementById('openFormBtn');
var addForm = document.getElementById('addForm');
function fillFormFields(loan) {
  document.getElementById('fName').value = loan ? loan.name : '';
  document.getElementById('fPrincipal').value = loan ? formatMoneyValue(loan.principal) : '';
  document.getElementById('fIssue').value = fmtDateInput(loan ? loan.issueDate : localToday());
  setType(loan ? loan.type : 'deadline');
  document.getElementById('fReturn').value = loan && loan.type === 'deadline' ? formatMoneyValue(loan.returnAmount) : '';
  document.getElementById('fDue').value = loan && loan.type === 'deadline' ? fmtDateInput(loan.dueDate) : '';
  document.getElementById('fRateD').value = loan && loan.type === 'deadline' ? formatMoneyValue(loan.dailyRate) : '500';
  document.getElementById('fRate').value = loan && loan.type === 'daily' ? formatMoneyValue(loan.dailyRate) : '500';
}
function openAddForm() {
  editingId = null;
  fillFormFields(null);
  document.getElementById('saveLoanBtn').textContent = 'Записать';
  showFormError(null);
  addForm.classList.remove('collapsed');
  openFormBtn.classList.add('hidden');
}
function openEditForm(loan) {
  editingId = loan.id;
  fillFormFields(loan);
  document.getElementById('saveLoanBtn').textContent = 'Сохранить';
  showFormError(null);
  addForm.classList.remove('collapsed');
  openFormBtn.classList.add('hidden');
  addForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function closeForm() {
  editingId = null;
  addForm.classList.add('collapsed');
  openFormBtn.classList.remove('hidden');
  showFormError(null);
}
openFormBtn.addEventListener('click', openAddForm);
document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
document.getElementById('segDeadline').addEventListener('click', function() { setType('deadline'); });
document.getElementById('segDaily').addEventListener('click', function() { setType('daily'); });
function setType(t) {
  fType = t;
  document.getElementById('segDeadline').classList.toggle('on', t === 'deadline');
  document.getElementById('segDaily').classList.toggle('on', t === 'daily');
  document.getElementById('deadlineFields').classList.toggle('hidden', t !== 'deadline');
  document.getElementById('dailyFields').classList.toggle('hidden', t !== 'daily');
}
function showFormError(msg) {
  var el = document.getElementById('formError');
  if (!msg) { el.classList.add('hidden'); return; }
  el.textContent = msg; el.classList.remove('hidden');
}
document.getElementById('saveLoanBtn').addEventListener('click', function() {
  var name = document.getElementById('fName').value.trim();
  var principal = parseMoneyInput('fPrincipal');
  var issueRaw = document.getElementById('fIssue').value.trim();
  var issue = issueRaw ? parseRuDate(issueRaw) : localToday();
  if (!name) return showFormError('Впиши имя');
  if (issueRaw && !issue) return showFormError('Дата выдачи — в формате ДД.ММ или ДД.ММ.ГГГГ');
  if (!isFinite(principal) || principal <= 0) return showFormError('Сумма — число больше нуля');
  var patch = { name: name, principal: principal, issueDate: issue, type: fType };
  if (fType === 'deadline') {
    var ret = parseMoneyInput('fReturn');
    var dueRaw = document.getElementById('fDue').value.trim();
    var due = parseRuDate(dueRaw);
    var rate = parseMoneyInput('fRateD');
    if (!isFinite(ret) || ret <= 0) return showFormError('Сумма возврата — число больше нуля');
    if (!dueRaw) return showFormError('Укажи дату возврата');
    if (!due) return showFormError('Дата возврата — в формате ДД.ММ или ДД.ММ.ГГГГ');
    if (due < issue) return showFormError('Дата возврата раньше даты выдачи');
    if (!isFinite(rate) || rate < 0) return showFormError('₽/день — число (можно 0)');
    patch.returnAmount = ret; patch.dueDate = due; patch.dailyRate = rate;
  } else {
    var rate2 = parseMoneyInput('fRate');
    if (!isFinite(rate2) || rate2 < 0) return showFormError('₽/день — число (можно 0)');
    patch.dailyRate = rate2;
  }
  if (editingId) {
    loans = loans.map(function(l) { return l.id === editingId ? Object.assign({}, l, patch) : l; });
  } else {
    loans.unshift(Object.assign({ id: String(Date.now()), payments: [], closed: false, pauses: [] }, patch));
  }
  save();
  closeForm();
  render();
});

// backup / restore
function serializeData() { return JSON.stringify({ loans: loans }); }
function applyRestoredData(rawText) {
  try {
    var parsed = JSON.parse(rawText);
    if (!Array.isArray(parsed.loans)) throw new Error('нет поля loans');
    loans = parsed.loans;
    save(); render();
    return true;
  } catch (e) {
    alert('Не похоже на копию: ' + e.message);
    return false;
  }
}
document.getElementById('backupBtn').addEventListener('click', function() {
  var data = serializeData();
  var msg = document.getElementById('backupMsg');
  function ok() { msg.textContent = 'Скопировано — вставь в Заметки'; msg.classList.remove('hidden'); setTimeout(function(){ msg.classList.add('hidden'); }, 3000); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(ok, function() { prompt('Скопируй вручную:', data); });
  } else {
    prompt('Скопируй вручную:', data);
  }
});
document.getElementById('downloadBtn').addEventListener('click', function() {
  var blob = new Blob([serializeData()], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'dolgi-' + localToday() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});
document.getElementById('restoreToggleBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.toggle('hidden');
});
document.getElementById('restoreCancelBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.add('hidden');
});
document.getElementById('restoreApplyBtn').addEventListener('click', function() {
  var ok = applyRestoredData(document.getElementById('restoreText').value);
  if (ok) {
    document.getElementById('restoreArea').classList.add('hidden');
    document.getElementById('restoreText').value = '';
  }
});
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() { applyRestoredData(String(reader.result)); };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('lockPinInput').addEventListener('input', function(e) {
  var v = e.target.value;
  if (v.length === 4) {
    attemptUnlock(v, function(ok) {
      if (ok) {
        hideLockScreen();
      } else {
        document.getElementById('lockError').classList.remove('hidden');
        e.target.value = '';
      }
    });
  }
});
document.addEventListener('visibilitychange', checkRelock);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(e) { console.warn('SW register failed', e); });
  });
}

applyTheme(themeMode);
load();
render();
if (isPinSet()) { showLockScreen(); }
</script>
