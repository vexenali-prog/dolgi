<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Долги">
<link rel="apple-touch-icon" href="icon.png">
<title>Долги</title>
<style>
  :root {
    --bg: #000; --card: #1C1C1E; --inner: #2C2C2E; --segment: #48484A;
    --sep: #38383A; --text: #FFF; --sec: rgba(235,235,245,0.6); --ter: rgba(235,235,245,0.3);
    --blue: #0A84FF; --green: #30D158; --red: #FF453A; --orange: #FF9F0A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    padding: env(safe-area-inset-top) 0 60px;
  }
  .wrap { max-width: 430px; margin: 0 auto; padding-top: 18px; }
  h1 { font-size: 34px; font-weight: 700; margin: 0; padding: 0 16px; }
  .card { background: var(--card); border-radius: 12px; margin: 0 16px; }
  .balance { padding: 16px; margin-top: 14px; }
  .balance .lbl { font-size: 13px; color: var(--sec); margin-bottom: 4px; }
  .balance .sum { font-size: 36px; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .balance .sub { font-size: 14px; margin-top: 6px; color: var(--sec); }
  .drip { color: var(--green); font-weight: 600; }
  .section { font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--sec); padding: 0 16px 7px; margin-top: 22px; }
  .btn-filled {
    display: block; width: calc(100% - 32px); margin: 12px 16px 0; background: var(--blue); color: #fff;
    border: none; border-radius: 12px; padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn-text { background: none; border: none; font-size: 15px; padding: 6px 2px; cursor: pointer; color: var(--blue); }
  .btn-text.bold { font-weight: 600; }
  .btn-text.green { color: var(--green); }
  .btn-text.red { color: var(--red); }
  .btn-text.sec { color: var(--sec); }
  input {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 11px 12px; font-size: 17px; width: 100%; outline: none; -webkit-appearance: none;
    color-scheme: dark;
  }
  .row { display: flex; gap: 10px; }
  .grid { display: grid; gap: 10px; }
  .form { padding: 14px; margin-top: 12px; }
  .seg { display: flex; background: var(--inner); border-radius: 9px; padding: 2px; }
  .seg button {
    flex: 1; padding: 8px 0; border-radius: 7px; border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: var(--sec);
  }
  .seg button.on { background: var(--segment); color: var(--text); }
  .err { color: var(--red); font-size: 14px; }
  .loan { padding: 13px 16px; }
  .loan + .loan { border-top: 0.5px solid var(--sep); }
  .loan .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .loan .name { font-size: 17px; font-weight: 600; }
  .loan .owed { font-size: 20px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .loan .status { font-size: 14px; margin-top: 3px; }
  .loan .meta { font-size: 13px; color: var(--ter); margin-top: 2px; }
  .pay-line { font-size: 13px; display: flex; justify-content: space-between; padding: 2px 0; color: var(--sec); }
  .pay-line .val { color: var(--green); font-variant-numeric: tabular-nums; }
  .pay-line .item { color: var(--orange); }
  .actions { display: flex; gap: 16px; margin-top: 6px; }
  .empty { padding: 18px; color: var(--sec); font-size: 15px; }
  .closed-item { padding: 12px 16px; border-top: 0.5px solid var(--sep); }
  .footer { font-size: 12px; color: var(--ter); margin: 24px 16px 0; line-height: 1.5; }
  textarea {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 10px; font-size: 13px; width: 100%; min-height: 90px; outline: none; font-family: ui-monospace, monospace;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Долги</h1>

  <div class="card balance">
    <div class="lbl">Должны сейчас</div>
    <div class="sum" id="totalOwed">0 ₽</div>
    <div class="sub" id="totalSub"></div>
  </div>

  <button class="btn-filled" id="openFormBtn">Новый долг</button>

  <div class="card form hidden" id="addForm">
    <div class="grid">
      <input id="fName" placeholder="Кому дал">
      <div class="row">
        <input id="fPrincipal" type="number" inputmode="numeric" placeholder="Сумма, ₽">
        <input id="fIssue" type="date">
      </div>
      <div class="seg">
        <button type="button" id="segDeadline" class="on">К сроку</button>
        <button type="button" id="segDaily">Капает сразу</button>
      </div>
      <div class="grid" id="deadlineFields">
        <div class="row">
          <input id="fReturn" type="number" inputmode="numeric" placeholder="Вернуть, ₽">
          <input id="fDue" type="date">
        </div>
        <input id="fRateD" type="number" inputmode="numeric" placeholder="₽/день после срока" value="500">
      </div>
      <div class="grid hidden" id="dailyFields">
        <input id="fRate" type="number" inputmode="numeric" placeholder="₽/день со следующего дня" value="500">
      </div>
      <div class="err hidden" id="formError"></div>
      <button class="btn-filled" style="margin:0;width:100%" id="saveLoanBtn">Записать</button>
      <div style="text-align:center"><button class="btn-text sec" id="cancelFormBtn">Отмена</button></div>
    </div>
  </div>

  <div class="section">Активные</div>
  <div class="card" id="activeList"></div>

  <div id="closedBlock" class="hidden">
    <div class="section">Погашенные</div>
    <div class="card" id="closedList"></div>
  </div>

  <div class="section">Данные</div>
  <div class="card" style="padding:12px 16px">
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <button class="btn-text" id="backupBtn">Скопировать копию</button>
      <button class="btn-text" id="restoreToggleBtn">Восстановить</button>
    </div>
    <div id="restoreArea" class="hidden" style="margin-top:10px">
      <textarea id="restoreText" placeholder="Вставь сюда сохранённую копию"></textarea>
      <div style="display:flex;gap:16px;margin-top:6px">
        <button class="btn-text bold" id="restoreApplyBtn">Загрузить</button>
        <button class="btn-text sec" id="restoreCancelBtn">Отмена</button>
      </div>
    </div>
    <div id="backupMsg" style="font-size:13px;color:var(--green);margin-top:6px" class="hidden"></div>
  </div>

  <div class="footer">Данные хранятся на этом устройстве (localStorage). Иногда жми «Скопировать копию» и сохраняй текст в Заметки — на случай чистки Safari.</div>
</div>

<script>
// ---------- math (verified 8/8 against the owner's examples) ----------
function daysBetween(a, b) { return Math.round((Date.parse(b) - Date.parse(a)) / 86400000); }
function paidSum(l) { return (l.payments || []).reduce(function(s, p) { return s + p.value; }, 0); }
function owedNow(l, t) {
  if (l.type === 'deadline') {
    var over = Math.max(0, daysBetween(l.dueDate, t));
    return l.returnAmount + over * l.dailyRate - paidSum(l);
  }
  var days = Math.max(0, daysBetween(l.issueDate, t));
  return l.principal + days * l.dailyRate - paidSum(l);
}
function dripPerDay(l, t) {
  if (l.type === 'deadline') return daysBetween(l.dueDate, t) > 0 ? l.dailyRate : 0;
  return l.dailyRate;
}
function localToday() {
  var d = new Date(), p = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function fmtDate(ymd) { if (!ymd) return ''; var p = ymd.split('-'); return p[2] + '.' + p[1]; }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ---------- state ----------
var KEY = 'radmir-debts';
var loans = [];
var fType = 'deadline';
var payingId = null;
var deleteArmId = null;
var showClosed = false;

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed.loans)) loans = parsed.loans;
    }
  } catch (e) { loans = []; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ loans: loans })); }
  catch (e) { alert('Не удалось сохранить: ' + e.message); }
}

// ---------- render ----------
function statusInfo(l, t) {
  if (l.type === 'deadline') {
    var over = daysBetween(l.dueDate, t);
    if (over > 0) return { text: 'Просрочка ' + over + ' дн · +' + fmt(l.dailyRate) + ' ₽/день', color: 'var(--red)', overdue: true };
    if (over === 0) return { text: 'Вернуть сегодня', color: 'var(--orange)', overdue: false };
    return { text: 'Вернуть до ' + fmtDate(l.dueDate), color: 'var(--sec)', overdue: false };
  }
  var days = Math.max(0, daysBetween(l.issueDate, t));
  return { text: 'Капает ' + days + ' дн · +' + fmt(l.dailyRate) + ' ₽/день', color: 'var(--orange)', overdue: false };
}

function render() {
  var t = localToday();
  var act = loans.filter(function(l) { return !l.closed; });
  act.sort(function(a, b) {
    var ao = a.type === 'deadline' && daysBetween(a.dueDate, t) > 0 ? 1 : 0;
    var bo = b.type === 'deadline' && daysBetween(b.dueDate, t) > 0 ? 1 : 0;
    if (ao !== bo) return bo - ao;
    return owedNow(b, t) - owedNow(a, t);
  });
  var cls = loans.filter(function(l) { return l.closed; });

  var total = act.reduce(function(s, l) { return s + Math.max(0, owedNow(l, t)); }, 0);
  var drip = act.reduce(function(s, l) { return s + dripPerDay(l, t); }, 0);
  document.getElementById('totalOwed').textContent = fmt(total) + ' ₽';
  document.getElementById('totalSub').innerHTML =
    (drip > 0 ? '<span class="drip">+' + fmt(drip) + ' ₽/день</span> · ' : '') +
    act.length + ' активных' + (cls.length ? ' · ' + cls.length + ' закрыто' : '');

  var box = document.getElementById('activeList');
  if (act.length === 0) {
    box.innerHTML = '<div class="empty">Пока никто не должен.</div>';
  } else {
    box.innerHTML = act.map(function(l) {
      var owed = Math.max(0, owedNow(l, t));
      var st = statusInfo(l, t);
      var pays = (l.payments || []).map(function(p) {
        return '<div class="pay-line"><span>' + fmtDate(p.date) + ' · ' +
          (p.note ? '<span class="item">' + esc(p.note) + '</span>' : 'деньгами') +
          '</span><span class="val">−' + fmt(p.value) + ' ₽</span></div>';
      }).join('');
      var actions;
      if (payingId === l.id) {
        actions =
          '<div class="grid" style="margin-top:10px">' +
          '<div class="row">' +
          '<input type="number" inputmode="numeric" placeholder="Сумма" style="width:120px;flex-shrink:0" id="payValue" autofocus>' +
          '<input placeholder="Чем? (пусто = деньги)" id="payNote">' +
          '</div>' +
          '<div style="display:flex;gap:14px">' +
          '<button class="btn-text bold" data-act="paydo" data-id="' + l.id + '">Списать</button>' +
          '<button class="btn-text sec" data-act="paycancel">Отмена</button>' +
          '</div></div>';
      } else {
        actions =
          '<div class="actions">' +
          '<button class="btn-text bold" data-act="pay" data-id="' + l.id + '">Выплата</button>' +
          '<button class="btn-text green bold" data-act="close" data-id="' + l.id + '">Погасил</button>' +
          '<button class="btn-text red" data-act="del" data-id="' + l.id + '">' + (deleteArmId === l.id ? 'Точно удалить?' : 'Удалить') + '</button>' +
          '</div>';
      }
      return '<div class="loan">' +
        '<div class="top"><span class="name">' + esc(l.name) + '</span>' +
        '<span class="owed" style="color:' + (st.overdue ? 'var(--red)' : 'var(--text)') + '">' + fmt(owed) + ' ₽</span></div>' +
        '<div class="status" style="color:' + st.color + ';font-weight:' + (st.overdue ? 600 : 400) + '">' + st.text + '</div>' +
        '<div class="meta">Выдал ' + fmt(l.principal) + ' ₽ · ' + fmtDate(l.issueDate) +
        (l.type === 'deadline' ? ' · к возврату ' + fmt(l.returnAmount) + ' ₽' : '') + '</div>' +
        (pays ? '<div style="margin-top:8px">' + pays + '</div>' : '') +
        actions + '</div>';
    }).join('');
  }

  var cBlock = document.getElementById('closedBlock');
  var cList = document.getElementById('closedList');
  if (cls.length === 0) {
    cBlock.classList.add('hidden');
  } else {
    cBlock.classList.remove('hidden');
    var head = '<div style="padding:4px 16px"><button class="btn-text" data-act="toggleclosed">' +
      (showClosed ? 'Скрыть' : 'Показать (' + cls.length + ')') + '</button></div>';
    var rows = !showClosed ? '' : cls.map(function(l) {
      var items = (l.payments || []).filter(function(p) { return p.note; }).map(function(p) { return esc(p.note); }).join(', ');
      return '<div class="closed-item">' +
        '<div class="top"><span style="font-size:16px;font-weight:600;color:var(--sec)">' + esc(l.name) + '</span>' +
        '<span style="font-size:13px;color:var(--green)">✓ ' + fmtDate(l.closedDate) + '</span></div>' +
        '<div class="meta">Выдал ' + fmt(l.principal) + ' ₽ · вернул ' + fmt(paidSum(l)) + ' ₽' +
        (items ? ' · вещами: ' + items : '') + '</div>' +
        '<button class="btn-text red" data-act="del" data-id="' + l.id + '">' + (deleteArmId === l.id ? 'Точно удалить?' : 'Удалить') + '</button>' +
        '</div>';
    }).join('');
    cList.innerHTML = head + rows;
  }
}

// ---------- actions ----------
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-act]');
  if (!btn) return;
  var act = btn.getAttribute('data-act');
  var id = btn.getAttribute('data-id');
  if (act === 'pay') { payingId = id; deleteArmId = null; render(); }
  if (act === 'paycancel') { payingId = null; render(); }
  if (act === 'paydo') {
    var v = parseFloat(document.getElementById('payValue').value);
    var note = (document.getElementById('payNote').value || '').trim();
    if (isFinite(v) && v > 0) {
      loans = loans.map(function(l) {
        if (l.id !== id) return l;
        var pays = (l.payments || []).slice();
        pays.push({ id: String(Date.now()), date: localToday(), value: v, note: note });
        return Object.assign({}, l, { payments: pays });
      });
      payingId = null; save(); render();
    }
  }
  if (act === 'close') {
    loans = loans.map(function(l) { return l.id === id ? Object.assign({}, l, { closed: true, closedDate: localToday() }) : l; });
    save(); render();
  }
  if (act === 'del') {
    if (deleteArmId !== id) { deleteArmId = id; render(); return; }
    loans = loans.filter(function(l) { return l.id !== id; });
    deleteArmId = null; save(); render();
  }
  if (act === 'toggleclosed') { showClosed = !showClosed; render(); }
});

// form
var openFormBtn = document.getElementById('openFormBtn');
var addForm = document.getElementById('addForm');
openFormBtn.addEventListener('click', function() {
  addForm.classList.remove('hidden');
  openFormBtn.classList.add('hidden');
  document.getElementById('fIssue').value = localToday();
});
document.getElementById('cancelFormBtn').addEventListener('click', function() {
  addForm.classList.add('hidden');
  openFormBtn.classList.remove('hidden');
  showFormError(null);
});
document.getElementById('segDeadline').addEventListener('click', function() { setType('deadline'); });
document.getElementById('segDaily').addEventListener('click', function() { setType('daily'); });
function setType(t) {
  fType = t;
  document.getElementById('segDeadline').classList.toggle('on', t === 'deadline');
  document.getElementById('segDaily').classList.toggle('on', t === 'daily');
  document.getElementById('deadlineFields').classList.toggle('hidden', t !== 'deadline');
  document.getElementById('dailyFields').classList.toggle('hidden', t !== 'daily');
}
function showFormError(msg) {
  var el = document.getElementById('formError');
  if (!msg) { el.classList.add('hidden'); return; }
  el.textContent = msg; el.classList.remove('hidden');
}
document.getElementById('saveLoanBtn').addEventListener('click', function() {
  var name = document.getElementById('fName').value.trim();
  var principal = parseFloat(document.getElementById('fPrincipal').value);
  var issue = document.getElementById('fIssue').value || localToday();
  if (!name) return showFormError('Впиши имя');
  if (!isFinite(principal) || principal <= 0) return showFormError('Сумма — число больше нуля');
  var loan = { id: String(Date.now()), name: name, principal: principal, issueDate: issue, payments: [], closed: false, type: fType };
  if (fType === 'deadline') {
    var ret = parseFloat(document.getElementById('fReturn').value);
    var due = document.getElementById('fDue').value;
    var rate = parseFloat(document.getElementById('fRateD').value);
    if (!isFinite(ret) || ret <= 0) return showFormError('Сумма возврата — число больше нуля');
    if (!due) return showFormError('Укажи дату возврата');
    if (!isFinite(rate) || rate < 0) return showFormError('₽/день — число (можно 0)');
    loan.returnAmount = ret; loan.dueDate = due; loan.dailyRate = rate;
  } else {
    var rate2 = parseFloat(document.getElementById('fRate').value);
    if (!isFinite(rate2) || rate2 < 0) return showFormError('₽/день — число (можно 0)');
    loan.dailyRate = rate2;
  }
  loans.unshift(loan);
  save();
  document.getElementById('fName').value = '';
  document.getElementById('fPrincipal').value = '';
  document.getElementById('fReturn').value = '';
  document.getElementById('fDue').value = '';
  showFormError(null);
  addForm.classList.add('hidden');
  openFormBtn.classList.remove('hidden');
  render();
});

// backup / restore
document.getElementById('backupBtn').addEventListener('click', function() {
  var data = JSON.stringify({ loans: loans });
  var msg = document.getElementById('backupMsg');
  function ok() { msg.textContent = 'Скопировано — вставь в Заметки'; msg.classList.remove('hidden'); setTimeout(function(){ msg.classList.add('hidden'); }, 3000); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(ok, function() { prompt('Скопируй вручную:', data); });
  } else {
    prompt('Скопируй вручную:', data);
  }
});
document.getElementById('restoreToggleBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.toggle('hidden');
});
document.getElementById('restoreCancelBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.add('hidden');
});
document.getElementById('restoreApplyBtn').addEventListener('click', function() {
  try {
    var parsed = JSON.parse(document.getElementById('restoreText').value);
    if (!Array.isArray(parsed.loans)) throw new Error('нет поля loans');
    loans = parsed.loans;
    save(); render();
    document.getElementById('restoreArea').classList.add('hidden');
    document.getElementById('restoreText').value = '';
  } catch (e) {
    alert('Не похоже на копию: ' + e.message);
  }
});

load();
render();
</script>
</body>
</html>
