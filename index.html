<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Долги">
<link rel="apple-touch-icon" href="icon.png">
<title>Долги</title>
<style>
  :root {
    --bg: #000; --card: #1C1C1E; --inner: #2C2C2E; --segment: #48484A;
    --sep: #38383A; --text: #FFF; --sec: rgba(235,235,245,0.6); --ter: rgba(235,235,245,0.3);
    --blue: #0A84FF; --green: #30D158; --red: #FF453A; --orange: #FF9F0A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    padding: env(safe-area-inset-top) 0 60px;
  }
  .wrap { max-width: 430px; margin: 0 auto; padding-top: 18px; }
  h1 { font-size: 34px; font-weight: 700; margin: 0; padding: 0 16px; }
  .card { background: var(--card); border-radius: 12px; margin: 0 16px; }
  .balance { padding: 16px; margin-top: 14px; }
  .balance .lbl { font-size: 13px; color: var(--sec); margin-bottom: 4px; }
  .balance .sum { font-size: 36px; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .balance .sub { font-size: 14px; margin-top: 6px; color: var(--sec); }
  .drip { color: var(--green); font-weight: 600; }
  .section { font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--sec); padding: 0 16px 7px; margin-top: 22px; }
  .search-wrap { padding: 0 16px; margin-top: 18px; }
  .btn-filled {
    display: block; width: calc(100% - 32px); margin: 12px 16px 0; background: var(--blue); color: #fff;
    border: none; border-radius: 12px; padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn-text { background: none; border: none; font-size: 15px; padding: 6px 2px; cursor: pointer; color: var(--blue); }
  .btn-text.bold { font-weight: 600; }
  .btn-text.green { color: var(--green); }
  .btn-text.red { color: var(--red); }
  .btn-text.orange { color: var(--orange); }
  .btn-text.sec { color: var(--sec); }
  .pbtn { background: none; border: none; color: var(--ter); font-size: 13px; padding: 0 3px; cursor: pointer; }
  input {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 11px 12px; font-size: 17px; width: 100%; outline: none; -webkit-appearance: none;
    color-scheme: dark;
  }
  .row { display: flex; gap: 10px; }
  .grid { display: grid; gap: 10px; }
  .form { padding: 14px; margin-top: 12px; }
  .seg { display: flex; background: var(--inner); border-radius: 9px; padding: 2px; }
  .seg button {
    flex: 1; padding: 8px 0; border-radius: 7px; border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; background: transparent; color: var(--sec);
  }
  .seg button.on { background: var(--segment); color: var(--text); }
  .err { color: var(--red); font-size: 14px; }
  .loan { padding: 13px 16px; }
  .loan + .loan { border-top: 0.5px solid var(--sep); }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .loan .name { font-size: 17px; font-weight: 600; }
  .loan .owed { font-size: 20px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .loan .status { font-size: 14px; margin-top: 3px; }
  .loan .meta { font-size: 13px; color: var(--ter); margin-top: 2px; }
  .pay-line { font-size: 13px; display: flex; justify-content: space-between; padding: 2px 0; color: var(--sec); }
  .pay-line .val { color: var(--green); font-variant-numeric: tabular-nums; }
  .pay-line .item { color: var(--orange); }
  .pay-line-edit { padding: 4px 0; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 6px; }
  .empty { padding: 18px; color: var(--sec); font-size: 15px; }
  .closed-item { padding: 12px 16px; border-top: 0.5px solid var(--sep); }
  .footer { font-size: 12px; color: var(--ter); margin: 24px 16px 0; line-height: 1.5; }
  textarea {
    background: var(--inner); border: none; border-radius: 10px; color: var(--text);
    padding: 10px; font-size: 13px; width: 100%; min-height: 90px; outline: none; font-family: ui-monospace, monospace;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Долги</h1>

  <div class="card balance">
    <div class="lbl">Должны сейчас</div>
    <div class="sum" id="totalOwed">0 ₽</div>
    <div class="sub" id="totalSub"></div>
  </div>

  <button class="btn-filled" id="openFormBtn">Новый долг</button>

  <div class="card form hidden" id="addForm">
    <div class="grid">
      <input id="fName" placeholder="Кому дал">
      <div class="row">
        <input id="fPrincipal" type="number" inputmode="numeric" placeholder="Сумма, ₽">
        <input id="fIssue" type="date">
      </div>
      <div class="seg">
        <button type="button" id="segDeadline" class="on">К сроку</button>
        <button type="button" id="segDaily">Капает сразу</button>
      </div>
      <div class="grid" id="deadlineFields">
        <div class="row">
          <input id="fReturn" type="number" inputmode="numeric" placeholder="Вернуть, ₽">
          <input id="fDue" type="date">
        </div>
        <input id="fRateD" type="number" inputmode="numeric" placeholder="₽/день после срока" value="500">
      </div>
      <div class="grid hidden" id="dailyFields">
        <input id="fRate" type="number" inputmode="numeric" placeholder="₽/день со следующего дня" value="500">
      </div>
      <div class="err hidden" id="formError"></div>
      <button class="btn-filled" style="margin:0;width:100%" id="saveLoanBtn">Записать</button>
      <div style="text-align:center"><button class="btn-text sec" id="cancelFormBtn">Отмена</button></div>
    </div>
  </div>

  <div class="search-wrap"><input id="searchInput" placeholder="Поиск по имени"></div>

  <div class="section">Активные</div>
  <div class="card" id="activeList"></div>

  <div id="closedBlock" class="hidden">
    <div class="section">Погашенные</div>
    <div class="card" id="closedList"></div>
  </div>

  <div id="historyBlock" class="hidden">
    <div class="section">История</div>
    <div class="card" id="historyList"></div>
  </div>

  <div class="section">Данные</div>
  <div class="card" style="padding:12px 16px">
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <button class="btn-text" id="backupBtn">Скопировать копию</button>
      <button class="btn-text" id="downloadBtn">Скачать файл</button>
      <button class="btn-text" id="restoreToggleBtn">Восстановить</button>
      <button class="btn-text" id="uploadBtn">Загрузить файл</button>
      <input type="file" id="fileInput" accept=".json,application/json" class="hidden">
    </div>
    <div id="restoreArea" class="hidden" style="margin-top:10px">
      <textarea id="restoreText" placeholder="Вставь сюда сохранённую копию"></textarea>
      <div style="display:flex;gap:16px;margin-top:6px">
        <button class="btn-text bold" id="restoreApplyBtn">Загрузить</button>
        <button class="btn-text sec" id="restoreCancelBtn">Отмена</button>
      </div>
    </div>
    <div id="backupMsg" style="font-size:13px;color:var(--green);margin-top:6px" class="hidden"></div>
  </div>

  <div class="footer">Данные хранятся на этом устройстве (localStorage). Иногда жми «Скопировать копию» или «Скачать файл» и сохраняй — на случай чистки Safari.</div>
</div>

<script>
// ---------- math (verified 8/8 against the owner's examples) ----------
function daysBetween(a, b) { return Math.round((Date.parse(b) - Date.parse(a)) / 86400000); }
function paidSum(l) { return (l.payments || []).reduce(function(s, p) { return s + p.value; }, 0); }

// day-index helpers for pause interval math (kept separate from daysBetween, which stays untouched)
function dayIndex(ymd) { return Math.round(Date.parse(ymd) / 86400000); }
function pausedDaysInRange(l, rangeStartYmd, rangeEndYmd) {
  var from = dayIndex(rangeStartYmd), to = dayIndex(rangeEndYmd);
  if (to <= from) return 0;
  var sum = 0;
  (l.pauses || []).forEach(function(p) {
    var ps = dayIndex(p.start);
    var pe = p.end ? dayIndex(p.end) : to;
    var s = Math.max(ps, from), e = Math.min(pe, to);
    if (e > s) sum += (e - s);
  });
  return sum;
}
function accruingDays(l, rangeStartYmd, t) {
  return Math.max(0, daysBetween(rangeStartYmd, t) - pausedDaysInRange(l, rangeStartYmd, t));
}
function isPausedOn(l, ymd) {
  var d = dayIndex(ymd);
  return (l.pauses || []).some(function(p) {
    var ps = dayIndex(p.start), pe = p.end ? dayIndex(p.end) : Infinity;
    return d >= ps && d < pe;
  });
}
function activePause(l) {
  var pauses = l.pauses || [];
  for (var i = pauses.length - 1; i >= 0; i--) if (pauses[i].end === null) return pauses[i];
  return null;
}

function owedNow(l, t) {
  if (l.type === 'deadline') {
    var over = accruingDays(l, l.dueDate, t);
    return l.returnAmount + over * l.dailyRate - paidSum(l);
  }
  var days = accruingDays(l, l.issueDate, t);
  return l.principal + days * l.dailyRate - paidSum(l);
}
function dripPerDay(l, t) {
  if (isPausedOn(l, t)) return 0;
  if (l.type === 'deadline') return daysBetween(l.dueDate, t) > 0 ? l.dailyRate : 0;
  return l.dailyRate;
}
function localToday() {
  var d = new Date(), p = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
function fmtDate(ymd) { if (!ymd) return ''; var p = ymd.split('-'); return p[2] + '.' + p[1]; }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ---------- state ----------
var KEY = 'radmir-debts';
var loans = [];
var fType = 'deadline';
var editingId = null;
var payingId = null;
var editingPaymentKey = null;
var deleteArmId = null;
var deleteArmPayKey = null;
var armTimer = null;
var showClosed = false;
var showHistory = false;
var searchQuery = '';

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed.loans)) loans = parsed.loans;
    }
  } catch (e) { loans = []; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ loans: loans })); }
  catch (e) { alert('Не удалось сохранить: ' + e.message); }
}

// ---------- search ----------
function matchesSearch(l) {
  var q = searchQuery.trim().toLowerCase();
  return !q || l.name.toLowerCase().indexOf(q) !== -1;
}

// ---------- history log ----------
function buildHistory(allLoans) {
  var events = [];
  allLoans.forEach(function(l) {
    var name = esc(l.name);
    events.push({ date: l.issueDate, order: 0, html: 'Записан долг «' + name + '» · ' + fmt(l.principal) + ' ₽' });
    (l.payments || []).forEach(function(p) {
      events.push({ date: p.date, order: 1, html: name + ' — выплата ' + fmt(p.value) + ' ₽' + (p.note ? ' (' + esc(p.note) + ')' : '') });
    });
    (l.pauses || []).forEach(function(p) {
      events.push({ date: p.start, order: 2, html: name + ' — поставлен на паузу' });
      if (p.end) events.push({ date: p.end, order: 3, html: name + ' — снят с паузы' });
    });
    if (l.closed) events.push({ date: l.closedDate, order: 4, html: name + ' — долг погашен' });
  });
  events.sort(function(a, b) {
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return b.order - a.order;
  });
  return events;
}

// ---------- render ----------
function statusInfo(l, t) {
  var pausedNow = isPausedOn(l, t);
  var rateSuffix = pausedNow ? ' · на паузе' : ' · +' + fmt(l.dailyRate) + ' ₽/день';
  if (l.type === 'deadline') {
    var over = daysBetween(l.dueDate, t);
    if (over > 0) return { text: 'Просрочка ' + over + ' дн' + rateSuffix, color: pausedNow ? 'var(--sec)' : 'var(--red)', overdue: !pausedNow };
    if (over === 0) return { text: 'Вернуть сегодня', color: 'var(--orange)', overdue: false };
    return { text: 'Вернуть до ' + fmtDate(l.dueDate), color: 'var(--sec)', overdue: false };
  }
  var days = Math.max(0, daysBetween(l.issueDate, t));
  return { text: 'Капает ' + days + ' дн' + rateSuffix, color: pausedNow ? 'var(--sec)' : 'var(--orange)', overdue: false };
}

function render() {
  var t = localToday();
  var allActive = loans.filter(function(l) { return !l.closed; });
  var allClosed = loans.filter(function(l) { return l.closed; });
  var act = allActive.filter(matchesSearch);
  act.sort(function(a, b) {
    var ao = a.type === 'deadline' && daysBetween(a.dueDate, t) > 0 ? 1 : 0;
    var bo = b.type === 'deadline' && daysBetween(b.dueDate, t) > 0 ? 1 : 0;
    if (ao !== bo) return bo - ao;
    return owedNow(b, t) - owedNow(a, t);
  });
  var cls = allClosed.filter(matchesSearch);

  var total = allActive.reduce(function(s, l) { return s + Math.max(0, owedNow(l, t)); }, 0);
  var drip = allActive.reduce(function(s, l) { return s + dripPerDay(l, t); }, 0);
  document.getElementById('totalOwed').textContent = fmt(total) + ' ₽';
  document.getElementById('totalSub').innerHTML =
    (drip > 0 ? '<span class="drip">+' + fmt(drip) + ' ₽/день</span> · ' : '') +
    allActive.length + ' активных' + (allClosed.length ? ' · ' + allClosed.length + ' закрыто' : '');

  var box = document.getElementById('activeList');
  if (act.length === 0) {
    box.innerHTML = '<div class="empty">' + (searchQuery.trim() ? 'Никого не найдено.' : 'Пока никто не должен.') + '</div>';
  } else {
    box.innerHTML = act.map(function(l) {
      var owed = Math.max(0, owedNow(l, t));
      var st = statusInfo(l, t);
      var pays = (l.payments || []).map(function(p) {
        var payKey = l.id + ':' + p.id;
        if (editingPaymentKey === payKey) {
          return '<div class="pay-line-edit">' +
            '<div class="row">' +
            '<input type="number" inputmode="numeric" value="' + p.value + '" style="width:100px;flex-shrink:0" id="payEditValue">' +
            '<input value="' + esc(p.note || '') + '" placeholder="Чем? (пусто = деньги)" id="payEditNote">' +
            '</div>' +
            '<div style="display:flex;gap:14px;margin-top:4px">' +
            '<button class="btn-text bold" data-act="paymentsave" data-id="' + l.id + '" data-pid="' + p.id + '">Сохранить</button>' +
            '<button class="btn-text sec" data-act="paymenteditcancel">Отмена</button>' +
            '</div></div>';
        }
        return '<div class="pay-line"><span>' + fmtDate(p.date) + ' · ' +
          (p.note ? '<span class="item">' + esc(p.note) + '</span>' : 'деньгами') +
          '</span><span class="val">−' + fmt(p.value) + ' ₽ ' +
          '<button class="pbtn" data-act="paymentedit" data-id="' + l.id + '" data-pid="' + p.id + '">✎</button>' +
          '<button class="pbtn" data-act="paymentdel" data-id="' + l.id + '" data-pid="' + p.id + '">' + (deleteArmPayKey === payKey ? '?' : '✕') + '</button>' +
          '</span></div>';
      }).join('');
      var actions;
      if (payingId === l.id) {
        actions =
          '<div class="grid" style="margin-top:10px">' +
          '<div class="row">' +
          '<input type="number" inputmode="numeric" placeholder="Сумма" style="width:120px;flex-shrink:0" id="payValue" autofocus>' +
          '<input placeholder="Чем? (пусто = деньги)" id="payNote">' +
          '</div>' +
          '<div style="display:flex;gap:14px">' +
          '<button class="btn-text bold" data-act="paydo" data-id="' + l.id + '">Списать</button>' +
          '<button class="btn-text sec" data-act="paycancel">Отмена</button>' +
          '</div></div>';
      } else {
        var isPausedState = !!activePause(l);
        actions =
          '<div class="actions">' +
          '<button class="btn-text bold" data-act="pay" data-id="' + l.id + '">Выплата</button>' +
          '<button class="btn-text green bold" data-act="close" data-id="' + l.id + '">Погасил</button>' +
          '<button class="btn-text" data-act="editloan" data-id="' + l.id + '">Изменить</button>' +
          (isPausedState
            ? '<button class="btn-text" data-act="resumeloan" data-id="' + l.id + '">Возобновить</button>'
            : '<button class="btn-text orange" data-act="pauseloan" data-id="' + l.id + '">Пауза</button>') +
          '<button class="btn-text red" data-act="del" data-id="' + l.id + '">' + (deleteArmId === l.id ? 'Точно удалить?' : 'Удалить') + '</button>' +
          '</div>';
      }
      return '<div class="loan">' +
        '<div class="top"><span class="name">' + esc(l.name) + '</span>' +
        '<span class="owed" style="color:' + (st.overdue ? 'var(--red)' : 'var(--text)') + '">' + fmt(owed) + ' ₽</span></div>' +
        '<div class="status" style="color:' + st.color + ';font-weight:' + (st.overdue ? 600 : 400) + '">' + st.text + '</div>' +
        '<div class="meta">Выдал ' + fmt(l.principal) + ' ₽ · ' + fmtDate(l.issueDate) +
        (l.type === 'deadline' ? ' · к возврату ' + fmt(l.returnAmount) + ' ₽' : '') + '</div>' +
        (pays ? '<div style="margin-top:8px">' + pays + '</div>' : '') +
        actions + '</div>';
    }).join('');
  }

  var cBlock = document.getElementById('closedBlock');
  var cList = document.getElementById('closedList');
  if (cls.length === 0) {
    cBlock.classList.add('hidden');
  } else {
    cBlock.classList.remove('hidden');
    var head = '<div style="padding:4px 16px"><button class="btn-text" data-act="toggleclosed">' +
      (showClosed ? 'Скрыть' : 'Показать (' + cls.length + ')') + '</button></div>';
    var rows = !showClosed ? '' : cls.map(function(l) {
      var items = (l.payments || []).filter(function(p) { return p.note; }).map(function(p) { return esc(p.note); }).join(', ');
      return '<div class="closed-item">' +
        '<div class="top"><span style="font-size:16px;font-weight:600;color:var(--sec)">' + esc(l.name) + '</span>' +
        '<span style="font-size:13px;color:var(--green)">✓ ' + fmtDate(l.closedDate) + '</span></div>' +
        '<div class="meta">Выдал ' + fmt(l.principal) + ' ₽ · вернул ' + fmt(paidSum(l)) + ' ₽' +
        (items ? ' · вещами: ' + items : '') + '</div>' +
        '<button class="btn-text red" data-act="del" data-id="' + l.id + '">' + (deleteArmId === l.id ? 'Точно удалить?' : 'Удалить') + '</button>' +
        '</div>';
    }).join('');
    cList.innerHTML = head + rows;
  }

  var hBlock = document.getElementById('historyBlock');
  var hList = document.getElementById('historyList');
  if (loans.length === 0) {
    hBlock.classList.add('hidden');
  } else {
    hBlock.classList.remove('hidden');
    var hHead = '<div style="padding:4px 16px"><button class="btn-text" data-act="togglehistory">' +
      (showHistory ? 'Скрыть' : 'Показать') + '</button></div>';
    var hRows = !showHistory ? '' : buildHistory(loans).map(function(ev) {
      return '<div class="closed-item"><div class="top"><span style="font-size:14px">' + ev.html + '</span>' +
        '<span style="font-size:13px;color:var(--ter);white-space:nowrap">' + fmtDate(ev.date) + '</span></div></div>';
    }).join('');
    hList.innerHTML = hHead + hRows;
  }
}

// ---------- actions ----------
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-act]');
  if (!btn) return;
  var act = btn.getAttribute('data-act');
  var id = btn.getAttribute('data-id');
  var pid = btn.getAttribute('data-pid');
  var payKey = pid ? id + ':' + pid : null;

  clearTimeout(armTimer);
  if (act !== 'del') deleteArmId = null;
  if (act !== 'paymentdel') deleteArmPayKey = null;

  if (act === 'pay') { payingId = id; editingPaymentKey = null; render(); return; }
  if (act === 'paycancel') { payingId = null; render(); return; }
  if (act === 'paydo') {
    var v = parseFloat(document.getElementById('payValue').value);
    var note = (document.getElementById('payNote').value || '').trim();
    if (isFinite(v) && v > 0) {
      loans = loans.map(function(l) {
        if (l.id !== id) return l;
        var pays = (l.payments || []).slice();
        pays.push({ id: String(Date.now()), date: localToday(), value: v, note: note });
        return Object.assign({}, l, { payments: pays });
      });
      payingId = null; save(); render();
    }
    return;
  }
  if (act === 'close') {
    loans = loans.map(function(l) { return l.id === id ? Object.assign({}, l, { closed: true, closedDate: localToday() }) : l; });
    save(); render();
    return;
  }
  if (act === 'del') {
    if (deleteArmId !== id) {
      deleteArmId = id;
      armTimer = setTimeout(function() { deleteArmId = null; render(); }, 3000);
      render();
      return;
    }
    loans = loans.filter(function(l) { return l.id !== id; });
    deleteArmId = null; save(); render();
    return;
  }
  if (act === 'toggleclosed') { showClosed = !showClosed; render(); return; }
  if (act === 'togglehistory') { showHistory = !showHistory; render(); return; }

  if (act === 'editloan') {
    var loan = loans.find(function(l) { return l.id === id; });
    if (loan) openEditForm(loan);
    return;
  }
  if (act === 'pauseloan') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pauses = (l.pauses || []).slice();
      pauses.push({ id: String(Date.now()), start: localToday(), end: null });
      return Object.assign({}, l, { pauses: pauses });
    });
    save(); render();
    return;
  }
  if (act === 'resumeloan') {
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pauses = (l.pauses || []).map(function(p) { return p.end === null ? Object.assign({}, p, { end: localToday() }) : p; });
      return Object.assign({}, l, { pauses: pauses });
    });
    save(); render();
    return;
  }

  if (act === 'paymentedit') { editingPaymentKey = payKey; payingId = null; render(); return; }
  if (act === 'paymenteditcancel') { editingPaymentKey = null; render(); return; }
  if (act === 'paymentsave') {
    var pv = parseFloat(document.getElementById('payEditValue').value);
    var pn = (document.getElementById('payEditNote').value || '').trim();
    if (isFinite(pv) && pv > 0) {
      loans = loans.map(function(l) {
        if (l.id !== id) return l;
        var pays = (l.payments || []).map(function(p) { return p.id === pid ? Object.assign({}, p, { value: pv, note: pn }) : p; });
        return Object.assign({}, l, { payments: pays });
      });
      editingPaymentKey = null; save(); render();
    }
    return;
  }
  if (act === 'paymentdel') {
    if (deleteArmPayKey !== payKey) {
      deleteArmPayKey = payKey;
      armTimer = setTimeout(function() { deleteArmPayKey = null; render(); }, 3000);
      render();
      return;
    }
    loans = loans.map(function(l) {
      if (l.id !== id) return l;
      var pays = (l.payments || []).filter(function(p) { return p.id !== pid; });
      return Object.assign({}, l, { payments: pays });
    });
    deleteArmPayKey = null; save(); render();
    return;
  }
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  render();
});

// form
var openFormBtn = document.getElementById('openFormBtn');
var addForm = document.getElementById('addForm');
function fillFormFields(loan) {
  document.getElementById('fName').value = loan ? loan.name : '';
  document.getElementById('fPrincipal').value = loan ? loan.principal : '';
  document.getElementById('fIssue').value = loan ? loan.issueDate : localToday();
  setType(loan ? loan.type : 'deadline');
  document.getElementById('fReturn').value = loan && loan.type === 'deadline' ? loan.returnAmount : '';
  document.getElementById('fDue').value = loan && loan.type === 'deadline' ? loan.dueDate : '';
  document.getElementById('fRateD').value = loan && loan.type === 'deadline' ? loan.dailyRate : 500;
  document.getElementById('fRate').value = loan && loan.type === 'daily' ? loan.dailyRate : 500;
}
function openAddForm() {
  editingId = null;
  fillFormFields(null);
  document.getElementById('saveLoanBtn').textContent = 'Записать';
  showFormError(null);
  addForm.classList.remove('hidden');
  openFormBtn.classList.add('hidden');
}
function openEditForm(loan) {
  editingId = loan.id;
  fillFormFields(loan);
  document.getElementById('saveLoanBtn').textContent = 'Сохранить';
  showFormError(null);
  addForm.classList.remove('hidden');
  openFormBtn.classList.add('hidden');
  addForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function closeForm() {
  editingId = null;
  addForm.classList.add('hidden');
  openFormBtn.classList.remove('hidden');
  showFormError(null);
}
openFormBtn.addEventListener('click', openAddForm);
document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
document.getElementById('segDeadline').addEventListener('click', function() { setType('deadline'); });
document.getElementById('segDaily').addEventListener('click', function() { setType('daily'); });
function setType(t) {
  fType = t;
  document.getElementById('segDeadline').classList.toggle('on', t === 'deadline');
  document.getElementById('segDaily').classList.toggle('on', t === 'daily');
  document.getElementById('deadlineFields').classList.toggle('hidden', t !== 'deadline');
  document.getElementById('dailyFields').classList.toggle('hidden', t !== 'daily');
}
function showFormError(msg) {
  var el = document.getElementById('formError');
  if (!msg) { el.classList.add('hidden'); return; }
  el.textContent = msg; el.classList.remove('hidden');
}
document.getElementById('saveLoanBtn').addEventListener('click', function() {
  var name = document.getElementById('fName').value.trim();
  var principal = parseFloat(document.getElementById('fPrincipal').value);
  var issue = document.getElementById('fIssue').value || localToday();
  if (!name) return showFormError('Впиши имя');
  if (!isFinite(principal) || principal <= 0) return showFormError('Сумма — число больше нуля');
  var patch = { name: name, principal: principal, issueDate: issue, type: fType };
  if (fType === 'deadline') {
    var ret = parseFloat(document.getElementById('fReturn').value);
    var due = document.getElementById('fDue').value;
    var rate = parseFloat(document.getElementById('fRateD').value);
    if (!isFinite(ret) || ret <= 0) return showFormError('Сумма возврата — число больше нуля');
    if (!due) return showFormError('Укажи дату возврата');
    if (due < issue) return showFormError('Дата возврата раньше даты выдачи');
    if (!isFinite(rate) || rate < 0) return showFormError('₽/день — число (можно 0)');
    patch.returnAmount = ret; patch.dueDate = due; patch.dailyRate = rate;
  } else {
    var rate2 = parseFloat(document.getElementById('fRate').value);
    if (!isFinite(rate2) || rate2 < 0) return showFormError('₽/день — число (можно 0)');
    patch.dailyRate = rate2;
  }
  if (editingId) {
    loans = loans.map(function(l) { return l.id === editingId ? Object.assign({}, l, patch) : l; });
  } else {
    loans.unshift(Object.assign({ id: String(Date.now()), payments: [], closed: false, pauses: [] }, patch));
  }
  save();
  closeForm();
  render();
});

// backup / restore
function serializeData() { return JSON.stringify({ loans: loans }); }
function applyRestoredData(rawText) {
  try {
    var parsed = JSON.parse(rawText);
    if (!Array.isArray(parsed.loans)) throw new Error('нет поля loans');
    loans = parsed.loans;
    save(); render();
    return true;
  } catch (e) {
    alert('Не похоже на копию: ' + e.message);
    return false;
  }
}
document.getElementById('backupBtn').addEventListener('click', function() {
  var data = serializeData();
  var msg = document.getElementById('backupMsg');
  function ok() { msg.textContent = 'Скопировано — вставь в Заметки'; msg.classList.remove('hidden'); setTimeout(function(){ msg.classList.add('hidden'); }, 3000); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(ok, function() { prompt('Скопируй вручную:', data); });
  } else {
    prompt('Скопируй вручную:', data);
  }
});
document.getElementById('downloadBtn').addEventListener('click', function() {
  var blob = new Blob([serializeData()], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'dolgi-' + localToday() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});
document.getElementById('restoreToggleBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.toggle('hidden');
});
document.getElementById('restoreCancelBtn').addEventListener('click', function() {
  document.getElementById('restoreArea').classList.add('hidden');
});
document.getElementById('restoreApplyBtn').addEventListener('click', function() {
  var ok = applyRestoredData(document.getElementById('restoreText').value);
  if (ok) {
    document.getElementById('restoreArea').classList.add('hidden');
    document.getElementById('restoreText').value = '';
  }
});
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() { applyRestoredData(String(reader.result)); };
  reader.readAsText(file);
  e.target.value = '';
});

load();
render();
</script>
</body>
